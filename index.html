<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: linear-gradient(to bottom, #000000, #000a1a);
            color: #e0f7fa;
            overflow: hidden;
            height: 100vh;
        }

        /* Underwater Background Effects */
        .bubble-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, rgba(0, 10, 30, 0.3), transparent 70%);
        }

        .shimmer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 50px, rgba(0, 100, 200, 0.05) 55px, transparent 60px);
            opacity: 0.3;
            animation: shimmerMove 30s linear infinite;
        }

        @keyframes shimmerMove {
            0% { background-position: 0 0; }
            100% { background-position: 500px 500px; }
        }

        /* Bubble Design */
        .bubble {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, #04d9ff 0%, rgba(4, 217, 255, 0.4) 60%, transparent);
            border-radius: 50%;
            border: 1.5px solid rgba(4, 217, 255, 0.5);
            opacity: 0.8;
            animation: riseBubble linear infinite, glowPulse 2s ease-in-out infinite alternate;
            z-index: -1;
            filter: brightness(1.2);
        }

        @keyframes riseBubble {
            0% { transform: translateY(100vh) translateX(0); opacity: 0.7; }
            50% { transform: translateY(50vh) translateX(calc(20px * var(--drift))); opacity: 0.9; }
            100% { transform: translateY(-100vh) translateX(calc(40px * var(--drift))); opacity: 0.3; }
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 8px rgba(4, 217, 255, 0.4), 0 0 15px rgba(4, 217, 255, 0.3); }
            100% { box-shadow: 0 0 15px rgba(4, 217, 255, 0.7), 0 0 25px rgba(4, 217, 255, 0.5); }
        }

        /* Container */
        .app-container {
            display: flex;
            height: 100vh;
            background: rgba(0, 5, 20, 0.4);
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: rgba(0, 15, 35, 0.5);
            border-right: 2px solid rgba(0, 188, 212, 0.3);
            padding: 20px;
            overflow-y: auto;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .sidebar.collapsed {
            transform: translateX(-280px);
        }

        .sidebar h1 {
            font-family: 'Kalam', cursive;
            color: #00e5ff;
            font-size: 1.8em;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.7);
        }

        .sidebar-buttons {
            margin-bottom: 20px;
        }

        .sidebar-buttons button {
            width: 100%;
            padding: 8px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #00bcd4, #00e5ff);
            border: none;
            border-radius: 5px;
            color: white;
            font-family: 'Space Mono', monospace;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sidebar-buttons button:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
        }

        .page-list {
            list-style: none;
        }

        .page-item {
            margin-bottom: 10px;
            background: rgba(0, 30, 70, 0.3);
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 188, 212, 0.2);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .page-item:hover {
            background: rgba(0, 50, 100, 0.5);
            border-color: rgba(0, 229, 255, 0.4);
        }

        .page-item.active {
            border-color: #00e5ff;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }

        .page-name {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #e0f7fa;
            font-family: 'Kalam', cursive;
            font-size: 1.1em;
            padding: 5px;
            outline: none;
        }

        .page-actions button {
            background: none;
            border: none;
            color: #80deea;
            cursor: pointer;
            font-size: 0.9em;
            margin-left: 5px;
            transition: color 0.2s ease;
        }

        .page-actions button:hover {
            color: #ff5252;
        }

        #new-page-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #00bcd4, #00e5ff);
            border: none;
            border-radius: 5px;
            color: white;
            font-family: 'Space Mono', monospace;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        #new-page-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.7);
        }

        .toggle-sidebar {
            position: absolute;
            top: 20px;
            right: -40px;
            background: #00bcd4;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 188, 212, 0.6);
            transition: all 0.3s ease;
        }

        .toggle-sidebar:hover {
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.8);
            transform: rotate(45deg);
        }

        /* Content Area (Highly Translucent Neon Blue Theme) */
        .content-area {
            flex-grow: 1;
            padding: 20px;
            background: rgba(0, 10, 30, 0.2);
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(0, 188, 212, 0.2);
            box-shadow: inset 0 0 40px rgba(0, 188, 212, 0.1);
        }

        #page-title {
            font-family: 'Kalam', cursive;
            font-size: 2em;
            color: #00e5ff;
            margin-bottom: 20px;
            background: transparent;
            border: none;
            border-bottom: 2px dashed rgba(0, 229, 255, 0.4);
            padding: 10px;
            outline: none;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.7);
        }

        .editor-container {
            flex-grow: 1;
            background: rgba(0, 20, 50, 0.15);
            border-radius: 10px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid rgba(0, 188, 212, 0.3);
            box-shadow: inset 0 0 25px rgba(0, 188, 212, 0.1), 0 0 20px rgba(0, 188, 212, 0.2);
        }

        #editor {
            height: calc(100% - 20px);
            color: #e0f7fa;
        }

        .ql-toolbar {
            background: rgba(0, 15, 35, 0.3);
            border: 1px solid rgba(0, 188, 212, 0.3);
            border-radius: 5px 5px 0 0;
        }

        .ql-container {
            background: rgba(0, 5, 25, 0.1);
            border: 1px solid rgba(0, 188, 212, 0.2);
            border-radius: 0 0 5px 5px;
        }

        .ql-editor {
            color: #e0f7fa;
            font-size: 1.2em;
        }

        ::selection {
            background: rgba(0, 188, 212, 0.4);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="bubble-bg">
        <div class="shimmer"></div>
        <!-- Bubbles will be added via JS -->
    </div>
    <div class="app-container">
        <div class="sidebar">
            <h1>Bubble Notes</h1>
            <div class="sidebar-buttons">
                <button id="new-page-btn">New Note</button>
                <button id="save-file-btn">Save as TXT</button>
                <button id="open-file-btn">Open TXT</button>
                <input type="file" id="file-input" accept=".txt" style="display: none;">
            </div>
            <ul class="page-list" id="page-list"></ul>
            <button class="toggle-sidebar" id="toggle-sidebar">‹</button>
        </div>
        <div class="content-area">
            <input type="text" id="page-title" placeholder="Note Title">
            <div class="editor-container">
                <div id="editor"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // Quill Editor Setup with Text Size Option
        const quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    ['link'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'size': ['small', false, 'large', 'huge'] }] // Text size options
                ]
            }
        });

        // Initialize Bubble Background
        function createBubble() {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.style.left = `${Math.random() * 100}vw`;
            bubble.style.top = `${Math.random() * 100}vh`;
            const size = Math.random() * 20 + 10;
            const duration = Math.random() * 5 + 5;
            const drift = (Math.random() * 2 - 1) * 0.5;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.animationDuration = `${duration}s, 2s`;
            bubble.style.animationDelay = `${Math.random() * 3}s`;
            bubble.style.opacity = Math.random() * 0.3 + 0.7;
            bubble.style.setProperty('--drift', drift);
            document.querySelector('.bubble-bg').appendChild(bubble);
        }
        for (let i = 0; i < 50; i++) createBubble();

        // Page Management
        let pages = JSON.parse(localStorage.getItem('bubbleNotes')) || [];
        let currentPageId = null;

        function savePages() {
            if (currentPageId) {
                const currentPage = pages.find(p => p.id === currentPageId);
                if (currentPage) {
                    currentPage.content = quill.root.innerHTML;
                    currentPage.title = document.getElementById('page-title').value || 'Untitled Note';
                }
            }
            localStorage.setItem('bubbleNotes', JSON.stringify(pages));
        }

        function loadPage(pageId) {
            savePages();
            currentPageId = pageId;
            const page = pages.find(p => p.id === pageId);
            document.getElementById('page-title').value = page.title;
            quill.root.innerHTML = page.content || '';
            document.querySelectorAll('.page-item').forEach(item => {
                item.classList.toggle('active', item.dataset.id === pageId);
            });
        }

        function renderPageList() {
            const list = document.getElementById('page-list');
            list.innerHTML = '';
            pages.forEach(page => {
                const li = document.createElement('li');
                li.className = 'page-item';
                li.dataset.id = page.id;
                li.innerHTML = `
                    <input type="text" class="page-name" value="${page.title}" onchange="renamePage('${page.id}', this.value)">
                    <div class="page-actions">
                        <button onclick="deletePage('${page.id}'); event.stopPropagation();">Del</button>
                    </div>
                `;
                li.onclick = () => loadPage(page.id);
                list.appendChild(li);
            });
        }

        function newPage() {
            const newId = Date.now().toString();
            pages.push({ id: newId, title: 'Untitled Note', content: '' });
            savePages();
            renderPageList();
            loadPage(newId);
        }

        function renamePage(id, newTitle) {
            const page = pages.find(p => p.id === id);
            if (page) {
                page.title = newTitle || 'Untitled Note';
                savePages();
            }
        }

        function deletePage(id) {
            if (confirm('Delete this note?')) {
                pages = pages.filter(p => p.id !== id);
                savePages();
                renderPageList();
                if (currentPageId === id && pages.length > 0) {
                    loadPage(pages[0].id);
                } else if (pages.length === 0) {
                    currentPageId = null;
                    quill.root.innerHTML = '';
                    document.getElementById('page-title').value = '';
                }
            }
        }

        // Save as TXT File
        function saveAsTxtFile() {
            if (!currentPageId) return;
            const currentPage = pages.find(p => p.id === currentPageId);
            if (!currentPage) return;
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = currentPage.content;
            const plainText = tempDiv.textContent || tempDiv.innerText || '';
            const title = currentPage.title || 'Untitled_Note';
            const content = `${title}\n\n${plainText}`;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${title.replace(/\s+/g, '_')}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Open TXT File
        function openTxtFile() {
            const input = document.getElementById('file-input');
            input.click();
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                const newId = Date.now().toString();
                const title = file.name.replace('.txt', '').replace(/_/g, ' ');
                const htmlContent = content.replace(/\n/g, '<br>');
                pages.push({ id: newId, title: title, content: `<p>${htmlContent}</p>` });
                savePages();
                renderPageList();
                loadPage(newId);
                e.target.value = '';
            };
            reader.readAsText(file);
        });

        // Sidebar Toggle
        document.getElementById('toggle-sidebar').onclick = function() {
            document.querySelector('.sidebar').classList.toggle('collapsed');
            this.textContent = this.textContent === '‹' ? '›' : '‹';
        };

        // Event Listeners for Buttons
        document.getElementById('new-page-btn').onclick = newPage;
        document.getElementById('save-file-btn').onclick = saveAsTxtFile;
        document.getElementById('open-file-btn').onclick = openTxtFile;
        document.getElementById('page-title').onchange = savePages;
        quill.on('text-change', savePages);

        // Initial Load
        if (pages.length > 0) {
            loadPage(pages[0].id);
        } else {
            newPage();
        }
        renderPageList();
    </script>
</body>
</html>
